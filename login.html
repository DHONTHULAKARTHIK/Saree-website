<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Lakshmanna Pure Silk Sarees</title>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <div class="bg-image"></div>

  <div class="auth-container">
    <div class="auth-header">
      <img src="logo.jpg" alt="Logo" class="auth-logo"/>
      <h1 class="auth-title" id="auth-title">Welcome</h1>
    </div>

    <!-- ── Login / Signup Toggle (hidden during forgot-password flow) ── -->
    <div class="auth-toggle" id="auth-toggle">
      <button class="toggle-btn active" onclick="switchTab('login')">Login</button>
      <button class="toggle-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" class="auth-form active" onsubmit="handleAuth(event, 'login')">
      <div class="input-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="Enter your email" required/>
      </div>
      <div class="input-group">
        <label for="login-pass">Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-pass" placeholder="Enter your password" required/>
          <span class="toggle-password" onclick="togglePassword('login-pass')">👁️</span>
        </div>
      </div>
      <div style="text-align:right; margin-top:-10px;">
        <a href="#" onclick="showForgotStep1(event)" class="forgot-link">Forgot Password?</a>
      </div>
      <button type="submit" class="submit-btn">Login to Account</button>
    </form>

    <!-- Sign Up Form -->
    <form id="form-signup" class="auth-form" onsubmit="handleAuth(event, 'signup')">
      <div class="input-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="Enter your name" required/>
      </div>
      <div class="input-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" placeholder="Enter your email" required/>
      </div>
      <div class="input-group">
        <label for="signup-pass">Password</label>
        <div class="password-wrapper">
          <input type="password" id="signup-pass" placeholder="Create a password" required/>
          <span class="toggle-password" onclick="togglePassword('signup-pass')">👁️</span>
        </div>
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <!-- ── FORGOT PASSWORD: Step 1 – Enter Email ── -->
    <form id="form-forgot-1" class="auth-form" onsubmit="sendResetCode(event)">
      <p class="fp-hint">Enter your registered email address and we'll send you a 6-digit reset code.</p>
      <div class="input-group">
        <label for="fp-email">Email Address</label>
        <input type="email" id="fp-email" placeholder="Enter your account email" required/>
      </div>
      <div id="fp-msg-1" class="fp-msg" style="display:none;"></div>
      <button type="submit" class="submit-btn" id="fp-send-btn">Send Reset Code</button>
      <button type="button" class="back-btn" onclick="showLoginTab()">← Back to Login</button>
    </form>

    <!-- ── FORGOT PASSWORD: Step 2 – Enter Code ── -->
    <form id="form-forgot-2" class="auth-form" onsubmit="verifyResetCode(event)">
      <p class="fp-hint">A 6-digit code was sent to <strong id="fp-sent-to"></strong>. Enter it below.</p>
      <div class="input-group">
        <label for="fp-code">Reset Code</label>
        <input type="text" id="fp-code" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric" required/>
      </div>
      <div id="fp-msg-2" class="fp-msg" style="display:none;"></div>
      <button type="submit" class="submit-btn" id="fp-verify-btn">Verify Code</button>
      <button type="button" class="back-btn" onclick="showForgotStep1(null)">← Resend Code</button>
    </form>

    <!-- ── FORGOT PASSWORD: Step 3 – New Password ── -->
    <form id="form-forgot-3" class="auth-form" onsubmit="resetPassword(event)">
      <p class="fp-hint">Great! Now set your new password.</p>
      <div class="input-group">
        <label for="fp-newpass">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="fp-newpass" placeholder="Enter new password" required/>
          <span class="toggle-password" onclick="togglePassword('fp-newpass')">👁️</span>
        </div>
      </div>
      <div class="input-group">
        <label for="fp-confirmpass">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="fp-confirmpass" placeholder="Confirm new password" required/>
          <span class="toggle-password" onclick="togglePassword('fp-confirmpass')">👁️</span>
        </div>
      </div>
      <div id="fp-msg-3" class="fp-msg" style="display:none;"></div>
      <button type="submit" class="submit-btn" id="fp-reset-btn">Reset Password</button>
    </form>

    <div class="skip-link" id="skip-link">
      <a href="#" onclick="continueAsGuest(event)">← Skip &amp; Continue as Guest</a>
    </div>
  </div>

  <script src="login.js"></script>

</body>
</html>
